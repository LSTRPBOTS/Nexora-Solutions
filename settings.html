<h2>Settings</h2>

<p>Set your ERLC API Key:</p>

<input id="apiKey" placeholder="Enter ERLC API Key">
<button onclick="saveKey()">Save Key</button>

<script>
const BACKEND = "https://nexora-solutions-offical.nexora-systems.workers.dev";

async function saveKey() {
    const key = document.getElementById("apiKey").value.trim();
    if (!key) return alert("Enter a key.");

    const res = await fetch(`${BACKEND}/api/setApiKey`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key })
    });

    const data = await res.json();

    if (data.success) {
        alert("API Key saved!");
    } else {
        alert("Error saving key.");
    }
}
</script>
