<!DOCTYPE html>
<html>
<head>
    <title>Your Servers</title>
    <style>
        body { background:#111; color:#fff; font-family:Arial; padding:20px; }
        .server {
            background:#222; padding:15px; margin-top:10px;
            border:1px solid #333; border-radius:6px;
            cursor:pointer;
        }
        .server:hover { background:#333; }
    </style>
</head>
<body>

<h2>Your Servers</h2>
<div id="serverList">Loading...</div>

<script>
const BACKEND = "https://nexora-solutions-offical.nexora-systems.workers.dev";

const username = localStorage.getItem("username");
if (!username) window.location.href = "index.html";

async function loadServers() {
    const res = await fetch(`${BACKEND}/api/getServers`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
    });

    const data = await res.json();

    const box = document.getElementById("serverList");
    box.innerHTML = "";

    if (!data.servers.length) {
        box.innerHTML = "<em>No servers assigned to your account.</em>";
        return;
    }

    data.servers.forEach(server => {
        const div = document.createElement("div");
        div.className = "server";
        div.textContent = server;
        div.onclick = () => {
            window.location.href = `cad.html?server=${encodeURIComponent(server)}`;
        };
        box.appendChild(div);
    });
}

loadServers();
</script>

</body>
</html>
