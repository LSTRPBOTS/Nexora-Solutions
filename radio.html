<!DOCTYPE html>
<html>
<head>
  <title>Nexora Radio</title>
  <meta charset="UTF-8">
  <style>
    body { font-family: monospace; background: #222; color: #0f0; padding: 20px; }
    .radio-container { border: 2px solid #444; padding: 15px; width: 300px; background: #000; }
    #modeBadge { background: #555; color: #fff; padding: 2px 5px; float: right; }
    #freqDisplay { font-size: 1.5rem; margin: 10px 0; }
    select, input, button { width: 100%; margin-top: 10px; background: #333; color: #0f0; border: 1px solid #555; }
    button { cursor: pointer; font-weight: bold; }
    button:active { background: #0f0; color: #000; }
  </style>
</head>
<body>

<div class="radio-container">
  <div id="modeBadge">---</div>
  <div id="freqDisplay">155.000</div>
  
  <label>ZONE</label>
  <select id="zoneSelect"></select>

  <label>CHANNEL</label>
  <select id="channelSelect"></select>

  <hr>
  
  <input id="freqInput" placeholder="Manual Freq...">
  <button id="setFreqBtn">SET FREQUENCY</button>
  
  <button id="ptt" style="height: 50px; margin-top: 20px;">PTT (TRANSMIT)</button>
  <div id="statusText" style="text-align:center; margin-top:5px;">IDLE</div>

  <div style="margin-top: 15px; font-size: 0.8rem;">
    <input type="checkbox" id="quickToggle"> ENABLE QUICK TX
    <button id="syncFromGovBtn" style="width: auto; float: right;">SYNC</button>
  </div>
</div>

<script src="radio.js"></script>
</body>
</html>
