<!DOCTYPE html>
<html>
<head>
    <title>Radio</title>
    <style>
        body { background:#111; color:#fff; font-family:Arial; padding:20px; }
        nav { background:#000; padding:10px; margin-bottom:20px; }
        nav a { color:#fff; margin-right:15px; text-decoration:none; }
        .panel {
            background:#222; padding:15px; border-radius:6px;
            border:1px solid #333;
        }
    </style>
</head>
<body>

<nav>
    <a href="./index.html">Login</a>
    <a href="./servers.html">Servers</a>
    <a href="./cad.html">CAD</a>
    <a href="./mdt.html">MDT</a>
    <a href="./radio.html">Radio</a>
    <a href="./admin.html">Admin</a>
    <a href="./settings.html">Settings</a>
    <a href="./keybinds.html">Keybinds</a>
</nav>

<div class="panel">
    <h2>Radio</h2>
    <p>PTT, Panic, and Unit Toggle are controlled by your saved keybinds.</p>
    <p id="status">Loading keybinds...</p>
</div>

<script>
const BACKEND = "https://nexora-solutions-offical.nexora-systems.workers.dev";
const username = localStorage.getItem("username");
if (!username) window.location.href = "index.html";

let binds = {};

async function loadKeybinds() {
    const res = await fetch(`${BACKEND}/api/getKeybinds`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
    });

    const data = await res.json();
    if (data.success) {
        binds = data.keybinds || {};
        document.getElementById("status").innerText =
            `PTT: ${binds.ptt || "Not set"}, Panic: ${binds.panic || "Not set"}, Unit Toggle: ${binds.unitToggle || "Not set"}`;
    } else {
        document.getElementById("status").innerText = "Failed to load keybinds.";
    }
}

document.addEventListener("keydown", (e) => {
    if (binds.ptt && e.code === binds.ptt) {
        console.log("PTT pressed");
    }
    if (binds.panic && e.code === binds.panic) {
        console.log("PANIC pressed");
    }
    if (binds.unitToggle && e.code === binds.unitToggle) {
        console.log("UNIT TOGGLE pressed");
    }
});

loadKeybinds();
</script>

</body>
</html>
