<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora CAD System - Division Review</title>
  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    button {
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background-color: #0078d7;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <h2>Admin Division Review</h2>
  <input type="text" id="divisionName" placeholder="Division Name">
  <button id="approveBtn">Approve</button>
  <button id="denyBtn">Deny</button>

  <script src="admin_divisions.js"></script>
</body>
</html>
