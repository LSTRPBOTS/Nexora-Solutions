<!DOCTYPE html>
<html>
<head>
    <title>CAD</title>
    <style>
        body { background:#111; color:#fff; font-family:Arial; }
        nav { background:#000; padding:10px; }
        nav a { color:#fff; margin-right:15px; text-decoration:none; }
        .container { padding:20px; display:flex; gap:20px; }
        .panel {
            flex:1; background:#222; padding:15px;
            border-radius:6px; border:1px solid #333;
        }
        input, select, button, textarea {
            width:100%; padding:8px; margin-top:8px;
            background:#333; color:#fff; border:1px solid #555;
        }
        button { cursor:pointer; }
        .call {
            border:1px solid #444; padding:8px; margin-top:8px;
            background:#181818;
        }
        .call button {
            width:auto; margin-right:5px; margin-top:5px;
        }
        h2 { margin-top:0; }
    </style>
</head>
<body>

<nav>
    <a href="./index.html">Login</a>
    <a href="./cad.html">CAD</a>
    <a href="./mdt.html">MDT</a>
    <a href="./radio.html">Radio</a>
    <a href="./admin.html">Admin</a>
    <a href="./settings.html">Settings</a>
</nav>

<div class="container">
    <div class="panel">
        <h2>Create Call</h2>
        <p>Server: <strong id="serverName"></strong></p>

        <label>Call Type</label>
        <input id="callType" placeholder="Robbery, Traffic Stop, etc.">

        <label>Location</label>
        <input id="callLocation" placeholder="123 Main St">

        <label>Description</label>
        <textarea id="callDesc" rows="3" placeholder="Details..."></textarea>

        <label>Priority</label>
        <select id="callPriority">
            <option value="1">Priority 1 - Emergency</option>
            <option value="2">Priority 2 - Urgent</option>
            <option value="3" selected>Priority 3 - Routine</option>
            <option value="4">Priority 4 - Info</option>
        </select>

        <button onclick="createCall()">Create Call</button>
    </div>

    <div class="panel">
        <h2>Active Calls</h2>
        <div id="callList"></div>
    </div>

    <div class="panel">
        <h2>Units</h2>
        <div id="unitList"></div>
    </div>
</div>

<script>
const BACKEND = "https://nexora-solutions-offical.nexora-systems.workers.dev";

const username = localStorage.getItem("username");
if (!username) window.location.href = "./index.html";

const urlParams = new URLSearchParams(window.location.search);
const serverName = urlParams.get("server") || "Unknown Server";
document.getElementById("serverName").innerText = serverName;
document.title = `CAD – ${serverName}`;

// ---- UNITS (FROM ADMIN, STILL LOCAL) ----
function loadUnits() {
    return JSON.parse(localStorage.getItem("unitList")) || [];
}

function renderUnits() {
    const units = loadUnits();
    const box = document.getElementById("unitList");
    box.innerHTML = "";
    if (!units.length) {
        box.innerHTML = "<em>No units configured in Admin.</em>";
        return;
    }
    units.forEach(u => {
        const div = document.createElement("div");
        div.textContent = `${u.badge} – ${u.name}`;
        box.appendChild(div);
    });
}

// ---- FETCH CALLS FROM BACKEND (PER SERVER) ----
async function fetchCalls() {
    const res = await fetch(`${BACKEND}/api/calls`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ serverName })
    });
    const data = await res.json();
    return data.calls || [];
}

// ---- CREATE CALL ----
async function createCall() {
    const type = document.getElementById("callType").value.trim();
    const loc = document.getElementById("callLocation").value.trim();
    const desc = document.getElementById("callDesc").value.trim();
    const pri = document.getElementById("callPriority").value;

    if (!type || !loc) {
        alert("Type and Location are required.");
        return;
    }

    const call = {
        id: Date.now(),
        type,
        location: loc,
        description: desc,
        priority: pri,
        status: "Pending",
        units: []
    };

    await fetch(`${BACKEND}/api/saveCall`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ serverName, call })
    });

    document.getElementById("callType").value = "";
    document.getElementById("callLocation").value = "";
    document.getElementById("callDesc").value = "";
    document.getElementById("callPriority").value = "3";

    renderCalls();
}

// ---- RENDER CALLS ----
async function renderCalls() {
    const calls = await fetchCalls();
    const box = document.getElementById("callList");
    box.innerHTML = "";

    if (!calls.length) {
        box.innerHTML = "<em>No active calls.</em>";
        return;
    }

    const units = loadUnits();

    calls.forEach(call => {
        const div = document.createElement("div");
        div.className = "call";

        const unitOptions = units.map(u => `<option value="${u.badge}">${u.badge} – ${u.name}</option>`).join("");

        div.innerHTML = `
            <strong>Call #${call.id}</strong><br>
            Type: ${call.type}<br>
            Location: ${call.location}<br>
            Priority: ${call.priority}<br>
            Status: ${call.status}<br>
            Units: ${call.units && call.units.length ? call.units.join(", ") : "None"}<br><br>

            <label>Assign Unit</label>
            <select data-callid="${call.id}" class="unitSelect">
                <option value="">Select unit...</option>
                ${unitOptions}
            </select>
            <button onclick="assignUnit(${call.id})">Assign</button>
            <button onclick="setStatus(${call.id}, 'En Route')">En Route</button>
            <button onclick="setStatus(${call.id}, 'On Scene')">On Scene</button>
            <button onclick="setStatus(${call.id}, 'Closed')">Close</button>
        `;

        box.appendChild(div);
    });
}

// ---- ASSIGN UNIT ----
async function assignUnit(callId) {
    const selects = document.querySelectorAll(".unitSelect");
    let selectedBadge = "";
    selects.forEach(sel => {
        if (Number(sel.getAttribute("data-callid")) === callId) {
            selectedBadge = sel.value;
        }
    });
    if (!selectedBadge) return;

    await fetch(`${BACKEND}/api/updateCall`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ serverName, callId, action: "assign", unit: selectedBadge })
    });

    renderCalls();
}

// ---- SET STATUS ----
async function setStatus(callId, status) {
    await fetch(`${BACKEND}/api/updateCall`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ serverName, callId, action: "status", status })
    });

    renderCalls();
}

// ---- INITIAL ----
renderUnits();
renderCalls();
setInterval(renderCalls, 2000);
</script>

</body>
</html>
