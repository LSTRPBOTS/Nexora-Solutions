<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexora CAD System - Master Panel</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }
    h1 { margin-bottom: 20px; }
    .community-item {
      background-color: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      margin: 10px auto;
      width: 320px;
    }
    button {
      padding: 8px 16px;
      background-color: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background-color: #005fa3; }
  </style>
</head>
<body>
  <h1>Master Access Panel</h1>
  <div id="adminContent"><p>Loading communities...</p></div>

  <script>
    const isMaster = localStorage.getItem("isMasterLogin") === "true";
    if (!isMaster) {
      alert("Access denied. Master login required.");
      window.location.href = "/community.html";
    }

    async function loadAdminCommunities() {
      const res = await fetch("https://nexora-systems-worker.nexora-systems.workers.dev/communities?all=true");
      const data = await res.json();
      const container = document.getElementById("adminContent");
      container.innerHTML = "";

      data.communities.forEach(comm => {
        const div = document.createElement("div");
        div.className = "community-item";
        div.innerHTML = `
          <h3>${comm.name}</h3>
          <p>Code: ${comm.code}</p>
          <button onclick="openCommunity('${comm.code}')">Enter Server</button>
        `;
        container.appendChild(div);
      });
    }

    function openCommunity(code) {
      alert(`Master access granted to ${code}.`);
      window.location.href = `/community_login.html?code=${encodeURIComponent(code)}&master=true`;
    }

    document.addEventListener("DOMContentLoaded", loadAdminCommunities);
  </script>
</body>
</html>
