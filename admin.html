<h2>Admin Panel</h2>

<div class="panel">
    <h3>Add Unit</h3>
    <input id="unitBadge" placeholder="Badge Number">
    <input id="unitName" placeholder="Unit Name">
    <button onclick="addUnit()">Add Unit</button>
</div>

<div class="panel">
    <h3>Units</h3>
    <div id="unitList"></div>
</div>

<div class="panel">
    <h3>Assign Server to User</h3>
    <input id="adminUsername" placeholder="Username">
    <input id="adminServer" placeholder="Server Name">
    <button onclick="assignServer()">Assign Server</button>
</div>

<script>
const BACKEND = "https://nexora-solutions-offical.nexora-systems.workers.dev";

// ---- UNITS (LOCAL STORAGE) ----
function loadUnits() {
    return JSON.parse(localStorage.getItem("unitList")) || [];
}

function saveUnits(units) {
    localStorage.setItem("unitList", JSON.stringify(units));
}

function addUnit() {
    const badge = document.getElementById("unitBadge").value.trim();
    const name = document.getElementById("unitName").value.trim();

    if (!badge || !name) return alert("Enter badge and name.");

    const units = loadUnits();
    units.push({ badge, name });
    saveUnits(units);

    document.getElementById("unitBadge").value = "";
    document.getElementById("unitName").value = "";

    renderUnits();
}

function renderUnits() {
    const units = loadUnits();
    const box = document.getElementById("unitList");
    box.innerHTML = "";

    if (!units.length) {
        box.innerHTML = "<em>No units added.</em>";
        return;
    }

    units.forEach(u => {
        const div = document.createElement("div");
        div.className = "unit";
        div.textContent = `${u.badge} – ${u.name}`;
        box.appendChild(div);
    });
}
