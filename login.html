<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexora CAD Login</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
    }
    .box {
      background-color: #111;
      border: 1px solid #333;
      border-radius: 8px;
      width: 350px;
      margin: 0 auto;
      padding: 20px;
    }
    button {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      background-color: #0078d7;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005fa3;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 4px;
      border: none;
      background-color: #222;
      color: #fff;
    }
    .disabled {
      background-color: #333 !important;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <h1>Nexora CAD Login</h1>

  <div class="box">

    <button class="disabled">Login with Google (Not in use)</button>
    <button class="disabled">Login with Discord (Not in use)</button>

    <hr style="margin: 20px 0; border-color:#333;">

    <h3>Manual Login</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="manualLogin()">Login</button>

    <p style="margin-top:15px;">
      Need an account?  
      <a href="/register.html" style="color:#4da3ff;">Register</a>
    </p>

  </div>

  <script src="login.js"></script>
</body>
</html>
